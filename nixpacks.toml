[phases.setup]
nixPkgs = [
  "chromium",
  "chromium-driver",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "xorg.libxcb",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "libgbm",
  "pango",
  "cairo",
  "alsa-lib",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

[start]
cmd = "gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT"
